<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto Gallery</title>
       <link rel="stylesheet" href="css/mystyle.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kasane Teto Gallery</h1>
            <p class="subtitle">重音テト アートギャラリー</p>
        </header>

        <div class="controls">
            <button class="btn" onclick="showRandom()">Случайная картинка</button>
            <button class="btn" onclick="loadGallery()">Обновить</button>
            <div class="counter" id="counter">Загрузка...</div>
        </div>

        <div class="gallery" id="gallery">
            <div class="loading">Загружаю галерею...</div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modal-img" src="" alt="Teto">
    </div>

    <script>
        // Загрузка галереи при открытии страницы
        window.onload = loadGallery;

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const counter = document.getElementById('counter');
            
            try {
                // Получаем список всех картинок
                const response = await fetch('/api/images');
                const data = await response.json();
                
                // Обновляем счётчик
                counter.textContent = `Всего изображений: ${data.total}`;
                
                // Очищаем галерею
                gallery.innerHTML = '';
                
                // Добавляем картинки
                data.images.forEach(filename => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.onclick = () => openModal(`/images/${filename}`);
                    
                    const img = document.createElement('img');
                    img.src = `/images/${filename}`;
                    img.alt = 'Teto';
                    img.loading = 'lazy'; // Ленивая загрузка
                    
                    item.appendChild(img);
                    gallery.appendChild(item);
                });
                
            } catch (error) {
                gallery.innerHTML = '<div class="loading">Ошибка загрузки</div>';
                console.error('Ошибка:', error);
            }
        }

        async function showRandom() {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            
            // Показываем случайную картинку в модальном окне
            modalImg.src = '/api/random?' + Date.now(); // + timestamp чтобы не кэшировалось
            modal.classList.add('active');
        }

        function openModal(src) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = src;
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
        }

        // Закрытие по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
