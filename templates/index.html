<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 1s;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .counter {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            animation: fadeIn 1.5s;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s;
            background: white;
            aspect-ratio: 1;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 50px;
        }

        /* Модальное окно для просмотра */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255,255,255,0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kasane Teto Gallery</h1>
            <p class="subtitle">重音テト アートギャラリー</p>
        </header>

        <div class="controls">
            <button class="btn" onclick="showRandom()">Случайная картинка</button>
            <button class="btn" onclick="loadGallery()">Обновить</button>
            <div class="counter" id="counter">Загрузка...</div>
        </div>

        <div class="gallery" id="gallery">
            <div class="loading">Загружаю галерею...</div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modal-img" src="" alt="Teto">
    </div>

    <script>
        // Загрузка галереи при открытии страницы
        window.onload = loadGallery;

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const counter = document.getElementById('counter');
            
            try {
                // Получаем список всех картинок
                const response = await fetch('/api/images');
                const data = await response.json();
                
                // Обновляем счётчик
                counter.textContent = `Всего изображений: ${data.total}`;
                
                // Очищаем галерею
                gallery.innerHTML = '';
                
                // Добавляем картинки
                data.images.forEach(filename => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.onclick = () => openModal(`/images/${filename}`);
                    
                    const img = document.createElement('img');
                    img.src = `/images/${filename}`;
                    img.alt = 'Teto';
                    img.loading = 'lazy'; // Ленивая загрузка
                    
                    item.appendChild(img);
                    gallery.appendChild(item);
                });
                
            } catch (error) {
                gallery.innerHTML = '<div class="loading">Ошибка загрузки</div>';
                console.error('Ошибка:', error);
            }
        }

        async function showRandom() {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            
            // Показываем случайную картинку в модальном окне
            modalImg.src = '/api/random?' + Date.now(); // + timestamp чтобы не кэшировалось
            modal.classList.add('active');
        }

        function openModal(src) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = src;
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
        }

        // Закрытие по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
