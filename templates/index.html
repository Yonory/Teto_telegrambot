<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto Gallery</title>
       <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kasane Teto Gallery</h1>
            <p class="subtitle">重音テト アートギャラリー</p>
        </header>

        <div class="controls">
            <button class="btn" onclick="showRandom()">Случайная картинка</button>
            <button class="btn" onclick="loadGallery()">Обновить</button>
            <div class="counter" id="counter">Загрузка...</div>
        </div>

        <div class="gallery" id="gallery">
            <div class="loading">Загружаю галерею...</div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modal-img" src="" alt="Teto">
    </div>
   <script src="modal.js"></script>
</body>
</html>
